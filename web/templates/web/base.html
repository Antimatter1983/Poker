{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Poker Tournament{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'web/style.css' %}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{% url 'web:home' %}">♠ Poker 100</a>
</header>
<main class="container">
  {% for message in messages %}<div class="message {{ message.tags }}">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
