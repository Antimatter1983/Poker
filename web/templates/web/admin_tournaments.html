{% extends 'web/base.html' %}
{% block title %}Администратор турниров{% endblock %}
{% block content %}
<section class="hero card">
  <div>
    <p class="eyebrow">Администратор</p>
    <h1>Создать турнир</h1>
    <p>Укажите номер турнира и количество раздач. По умолчанию турнир создаётся на 10 раздач.</p>
  </div>
  <form class="stack" method="post" action="{% url 'web:create_tournament' %}">
    {% csrf_token %}
    <label>Номер турнира <input name="tournament_number" type="number" min="1" step="1" placeholder="101" required autofocus></label>
    <label>Количество раздач <input name="hand_count" type="number" value="{{ default_hand_count }}" min="1" max="100"></label>
    <button class="primary">Создать турнир</button>
  </form>
</section>
<section class="card">
  <a class="button secondary" href="{% url 'web:home' %}">Вернуться в лобби</a>
</section>
{% endblock %}
