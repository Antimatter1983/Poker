{% extends 'web/base.html' %}
{% block title %}Администратор турниров{% endblock %}
{% block content %}
<section class="hero card">
  <div>
    <p class="eyebrow">Администратор</p>
    <h1>Создать турнир</h1>
    <p>Заполните простую форму. По умолчанию турнир создаётся на 10 раздач.</p>
  </div>
  <form class="stack" method="post" action="{% url 'web:create_tournament' %}">
    {% csrf_token %}
    <label>Название турнира <input name="title" placeholder="Sunday Call Bot Cup"></label>
    <label>Имя администратора <input name="admin" placeholder="Admin"></label>
    <label>Раздач <input name="hand_count" type="number" value="{{ default_hand_count }}" min="1" max="100"></label>
    <button class="primary">Создать турнир</button>
  </form>
</section>
<section class="card">
  <a class="button secondary" href="{% url 'web:home' %}">Вернуться в лобби</a>
</section>
{% endblock %}
